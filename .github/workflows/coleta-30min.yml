name: coleta-30min

# Coletas leves da CVM a cada 30 min (roda na nuvem do GitHub, autonomo).
# O cron do GitHub e' "best-effort" (pode atrasar sob carga).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: coleta-30min
  cancel-in-progress: false

jobs:
  coleta:
    runs-on: ubuntu-latest
    # Rede de seguranca: sem isto, um coletor travado roda ate o limite de 6h do
    # GitHub e (com cancel-in-progress: false) segura o grupo, pulando os ciclos
    # de 30 min seguintes. 25 min < 30 min garante que a cadencia nunca quebre.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Instalar poppler (pautas)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Coletar
        run: |
          # Cada coletor roda isolado: um que quebre nao impede os demais nem o
          # commit do que ja foi coletado, mas o nome dele fica em FALHAS e o
          # step "Conferir falhas" derruba o run no fim. Nao use "set +e; ...;
          # true" aqui: isso esconde a quebra e o run fica verde mentindo.
          falhas=""
          rodar() {
            echo "::group::$*"
            if ! python "$@"; then
              echo "::error::coletor falhou: $*"
              falhas="$falhas $1"
            fi
            echo "::endgroup::"
          }
          rodar scraper.py atualizar
          rodar scraper_pas.py atualizar
          rodar termos_baixar.py
          rodar julgar_baixar.py
          rodar sancionadores_julgados_baixar.py
          rodar quem_baixar.py
          rodar pautas_baixar.py
          echo "FALHAS=$falhas" >> "$GITHUB_ENV"
      - name: Commit, push e alerta
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "cvm-coleta-bot"
          git config user.email "cvm-coleta-bot@users.noreply.github.com"
          git add -A -- '*.db'
          if git diff --cached --quiet; then
            echo "sem mudancas"; exit 0
          fi
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "chore(coleta-30min): $CHANGED"
          git pull --rebase -X ours origin main || true
          git push origin HEAD:main
          python notificar.py "Coleta CVM (30min): atualizados $CHANGED" || true
      - name: Alertas cruzados
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python alertas_compostos.py || true
          git add alertas.db 2>/dev/null || true
          git diff --cached --quiet || { git commit -m "chore: estado de alertas"; git pull --rebase -X ours origin main || true; git push origin HEAD:main; }

      - name: Conferir falhas
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${FALHAS// /}" ]; then
            echo "::error::coletores que falharam:$FALHAS"
            python notificar.py "ALERTA Coleta CVM (30min) FALHOU em:$FALHAS" || true
            exit 1
          fi
          echo "todos os coletores rodaram sem erro"
