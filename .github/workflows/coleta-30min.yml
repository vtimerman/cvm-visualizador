name: coleta-30min

# Coletas leves da CVM a cada 30 min (roda na nuvem do GitHub, autonomo).
# O cron do GitHub e' "best-effort" (pode atrasar sob carga).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: coleta-30min
  cancel-in-progress: false

jobs:
  coleta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Instalar poppler (pautas)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Coletar
        run: |
          set +e
          python scraper.py atualizar
          python scraper_pas.py atualizar
          python termos_baixar.py
          python julgar_baixar.py
          python sancionadores_julgados_baixar.py
          python quem_baixar.py
          python pautas_baixar.py
          true
      - name: Commit, push e alerta
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "cvm-coleta-bot"
          git config user.email "cvm-coleta-bot@users.noreply.github.com"
          git add -A -- '*.db'
          if git diff --cached --quiet; then
            echo "sem mudancas"; exit 0
          fi
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "chore(coleta-30min): $CHANGED"
          git pull --rebase -X ours origin main || true
          git push origin HEAD:main
          python notificar.py "Coleta CVM (30min): atualizados $CHANGED" || true
