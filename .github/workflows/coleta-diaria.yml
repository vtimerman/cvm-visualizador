name: coleta-diaria

# Coletas diarias mais pesadas (~07:40 BRT = 10:40 UTC).
on:
  schedule:
    - cron: "40 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: coleta-diaria
  cancel-in-progress: false

jobs:
  coleta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Instalar poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Coletar (diario)
        run: |
          # Ver comentario em coleta-30min.yml: falha de um coletor nao pode
          # deixar o run verde.
          falhas=""
          rodar() {
            echo "::group::$*"
            if ! python "$@"; then
              echo "::error::coletor falhou: $*"
              falhas="$falhas $1"
            fi
            echo "::endgroup::"
          }
          rodar publicacoes_baixar.py atualizar 10
          rodar pautas_sei_baixar.py backfill
          rodar extratos_sei_baixar.py backfill
          rodar decisoes_baixar.py
          rodar atas_colegiado_texto.py
          rodar boletim_pessoal_baixar.py atualizar
          rodar boletim_pessoal_extrair.py tudo
          rodar scraper.py revisar
          rodar conduta_build.py build
          echo "FALHAS=$falhas" >> "$GITHUB_ENV"
      - name: Commit, push e alerta
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "cvm-coleta-bot"
          git config user.email "cvm-coleta-bot@users.noreply.github.com"
          git add -A -- '*.db'
          if git diff --cached --quiet; then
            echo "sem mudancas"; exit 0
          fi
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "chore(coleta-diaria): $CHANGED"
          git pull --rebase -X ours origin main || true
          git push origin HEAD:main
          python notificar.py "Coleta CVM (diaria): atualizados $CHANGED" || echo "::warning::notificacao nao enviada (conferir secrets TELEGRAM_TOKEN/TELEGRAM_CHAT_ID)"
      - name: Alertas cruzados
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python alertas_compostos.py || true
          git add alertas.db 2>/dev/null || true
          git diff --cached --quiet || { git commit -m "chore: estado de alertas"; git pull --rebase -X ours origin main || true; git push origin HEAD:main; }

      - name: Conferir falhas
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${FALHAS// /}" ]; then
            echo "::error::coletores que falharam:$FALHAS"
            python notificar.py "ALERTA Coleta CVM (diaria) FALHOU em:$FALHAS" || echo "::warning::notificacao nao enviada (conferir secrets TELEGRAM_TOKEN/TELEGRAM_CHAT_ID)"
            exit 1
          fi
          echo "todos os coletores rodaram sem erro"
