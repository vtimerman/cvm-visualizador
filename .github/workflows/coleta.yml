name: Coleta CVM (backfill manual)

# Coleta agendada migrou para coleta-30min/diaria/semanal. Este ficou como
# ferramenta de BACKFILL manual (audiencias/processos) sob demanda.
on:
  workflow_dispatch:            # so manual (backfill sob demanda)
    inputs:
      modo:
        description: "atualizar (padrao) ou backfill"
        default: "atualizar"
      fonte:
        description: "no backfill: audiencias (padrao) ou processos"
        default: "audiencias"
      ini:
        description: "id inicial (so no backfill)"
        default: "1"
      fim:
        description: "id final (so no backfill)"
        default: "33000"

permissions:
  contents: write

concurrency:
  group: coleta-cvm
  cancel-in-progress: false     # nao interrompe um backfill longo em andamento

jobs:
  coleta:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Rodar coleta
        env:
          PAUSA: "0.2"
          WORKERS: "6"
          # scraper.py avisa audiencia nova via notificar.py (Telegram). Antes
          # aqui vinham WHATSAPP_PHONE/CALLMEBOT_APIKEY, do canal antigo: os
          # scripts nao os usam mais, entao o aviso saia no vazio.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          modo="${{ github.event.inputs.modo }}"
          fonte="${{ github.event.inputs.fonte }}"
          if [ "$modo" = "backfill" ]; then
            if [ "$fonte" = "processos" ]; then
              python scraper_pas.py backfill "${{ github.event.inputs.ini }}" "${{ github.event.inputs.fim }}"
              python scraper_pas.py stats
            else
              python scraper.py backfill "${{ github.event.inputs.ini }}" "${{ github.event.inputs.fim }}"
              python scraper.py stats
            fi
          else
            python scraper.py atualizar
            python scraper.py stats
            # Noticias da CVM: pull incremental a cada coleta (barato)
            python noticias_baixar.py || true
            # Decisoes e Atas do Colegiado: pull incremental (barato)
            python decisoes_baixar.py || true
            # Processos Sancionadores: 1x/dia (por volta das 09h UTC), nao a cada 30min.
            # (a re-varredura de ids vazios roda na nuvem, em coleta-semanal.yml,
            #  as quartas - e' pesada)
            hora=$(date -u +%H)
            if [ "$hora" = "09" ]; then
              python scraper_pas.py atualizar
              python scraper_pas.py stats
            fi
          fi

      - name: Avisar falha
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python notificar.py "ALERTA: falha no backfill manual da CVM. Veja: https://github.com/vtimerman/cvm-visualizador/actions" \
            || echo "::warning::notificacao nao enviada (conferir secrets TELEGRAM_TOKEN/TELEGRAM_CHAT_ID)"

      - name: Publicar base atualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audiencias.db processos.db noticias.db decisoes.db
          if git diff --cached --quiet; then
            echo "Sem mudancas na base."
          else
            git commit -m "coleta: atualiza base ($(date -u +%FT%TZ))"
            # robusto a pushes concorrentes (mantém a base deste run em conflito)
            git pull --rebase -X ours origin main || true
            git push
          fi
