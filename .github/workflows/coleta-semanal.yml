name: coleta-semanal

# Re-varredura pesada dos Sancionadores (QUARTA ~07:30 BRT = 10:30 UTC).
# Ela e' a auto-cura dos PAS: a CVM preenche idProc ABAIXO do topo, e o
# scraper_pas.py atualizar so varre para frente — sem esta varredura total, um
# PAS preenchido em id baixo fica invisivel para sempre (aconteceu com o 13146,
# 19957.011288/2026-14). Por isso ela precisa CONCLUIR, nao so disparar.
on:
  schedule:
    - cron: "30 10 * * 3"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: coleta-semanal
  cancel-in-progress: false

jobs:
  coleta:
    runs-on: ubuntu-latest
    # O unico run que existiu (13/07) morreu no teto de 6h do GitHub: rodava com
    # WORKERS=1 (padrao) sobre ~12.9k ids. Com WORKERS=6 a varredura sadia leva
    # ~20 min; 90 min da folga larga e ainda mata uma trava cedo.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Varredura profunda
        env:
          WORKERS: "6"   # sem isto o padrao e' 1 worker e a varredura nao termina
        run: |
          # Ver comentario em coleta-30min.yml: falha de um coletor nao pode
          # deixar o run verde.
          falhas=""
          rodar() {
            echo "::group::$*"
            if ! python "$@"; then
              echo "::error::coletor falhou: $*"
              falhas="$falhas $1"
            fi
            echo "::endgroup::"
          }
          # Teto acima do maior idProc ja visto (13534) — com 13500 a varredura
          # nao alcancava o topo da base.
          rodar scraper_pas.py revarrer 1 13800
          rodar scraper_pas.py stats
          # Audiencias: o ciclo de 30 min para no muro de 100 vazios, logo um
          # salto de numeracao MAIOR que 100 deixaria o proximo despacho fora do
          # alcance dele para sempre. O backfill so busca ids AINDA NAO
          # conhecidos, entao isto varre exatamente a fronteira a frente (~2,7k
          # ids hoje) e se auto-ajusta conforme a base cresce.
          rodar scraper.py backfill 1 35000
          rodar scraper.py stats
          echo "FALHAS=$falhas" >> "$GITHUB_ENV"
      - name: Commit, push e alerta
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "cvm-coleta-bot"
          git config user.email "cvm-coleta-bot@users.noreply.github.com"
          git add -A -- '*.db'
          if git diff --cached --quiet; then
            echo "sem mudancas"; exit 0
          fi
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "chore(coleta-semanal): $CHANGED"
          git pull --rebase -X ours origin main || true
          git push origin HEAD:main
          python notificar.py "Coleta CVM (semanal/sancionadores): $CHANGED" || echo "::warning::notificacao nao enviada (conferir secrets TELEGRAM_TOKEN/TELEGRAM_CHAT_ID)"

      - name: Conferir falhas
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${FALHAS// /}" ]; then
            echo "::error::coletores que falharam:$FALHAS"
            python notificar.py "ALERTA Coleta CVM (semanal) FALHOU em:$FALHAS" || echo "::warning::notificacao nao enviada (conferir secrets TELEGRAM_TOKEN/TELEGRAM_CHAT_ID)"
            exit 1
          fi
          echo "todos os coletores rodaram sem erro"
