name: coleta-semanal

# Re-varredura pesada dos Sancionadores (segunda ~07:30 BRT = 10:30 UTC).
on:
  schedule:
    - cron: "30 10 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: coleta-semanal
  cancel-in-progress: false

jobs:
  coleta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Re-varrer sancionadores
        run: |
          set +e
          python scraper_pas.py revarrer 1 13500
          python scraper_pas.py stats
          true
      - name: Commit, push e alerta
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "cvm-coleta-bot"
          git config user.email "cvm-coleta-bot@users.noreply.github.com"
          git add -A -- '*.db'
          if git diff --cached --quiet; then
            echo "sem mudancas"; exit 0
          fi
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "chore(coleta-semanal): $CHANGED"
          git pull --rebase -X ours origin main || true
          git push origin HEAD:main
          python notificar.py "Coleta CVM (semanal/sancionadores): $CHANGED" || true
